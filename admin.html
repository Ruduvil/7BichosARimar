<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard | 7 Bichos a Rimar</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .admin-container {
      max-width: 800px;
      margin: 8rem auto 4rem;
      background: white;
      padding: 3rem;
      border-radius: 24px;
      box-shadow: var(--shadow);
    }
    .form-group {
      margin-bottom: 1.5rem;
    }
    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 600;
    }
    .form-control {
      width: 100%;
      padding: 1rem;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      font-family: inherit;
    }
    .hidden { display: none; }
    
    /* Admin Tabs */
    .tabs {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
      border-bottom: 2px solid #edf2f7;
      padding-bottom: 1rem;
    }
    .tab-btn {
      background: none;
      border: none;
      font-weight: 600;
      font-size: 1.1rem;
      color: #718096;
      cursor: pointer;
    }
    .tab-btn.active {
      color: var(--primary);
      border-bottom: 2px solid var(--primary);
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <nav class="navbar">
    <a href="index.html" class="nav-brand">7 Bichos a Rimar (Admin)</a>
    <div class="nav-links">
      <button id="btnLogout" class="btn-primary hidden" style="background: #e53e3e;">Terminar Sessão</button>
    </div>
  </nav>

  <main class="admin-container">
    
    <!-- Login Section -->
    <div id="loginSection">
      <h1>Entrar na Área Reservada</h1>
      <p style="margin-bottom: 2rem; color: #718096;">Isto é apenas para o proprietário do site modificar os conteúdos.</p>
      <form id="loginForm">
        <div class="form-group">
          <label>Email do Administrador</label>
          <input type="email" id="adminEmail" class="form-control" required>
        </div>
        <div class="form-group">
          <label>Palavra-passe</label>
          <input type="password" id="adminPassword" class="form-control" required>
        </div>
        <button type="submit" class="btn-primary">Entrar Seguro</button>
        <p id="loginError" style="color: red; margin-top: 1rem;"></p>
      </form>
    </div>

    <!-- Dashboard Section -->
    <div id="dashboardSection" class="hidden">
      <h1>Gestão do Site</h1>
      
      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('content')">Editar Textos</button>
        <button class="tab-btn" onclick="switchTab('orders')">Ver Encomendas</button>
      </div>

      <!-- Content Editor -->
      <div id="tabContent">
        <div class="form-group">
          <label>Título Principal (Página Inicial)</label>
          <input type="text" id="editHeroTitle" class="form-control" placeholder="A magia das palavras para as crianças">
        </div>
        <div class="form-group">
          <label>Texto Descritivo (Página Inicial)</label>
          <textarea id="editHeroDesc" class="form-control" rows="4"></textarea>
        </div>
        <div class="form-group">
          <label>História / Sobre O Livro</label>
          <textarea id="editAboutText" class="form-control" rows="6"></textarea>
        </div>
        <button id="btnSaveContent" class="btn-primary">Guardar Alterações do Site</button>
        <p id="saveMsg" style="color: green; margin-top: 1rem;"></p>
      </div>

      <!-- Orders Viewer -->
      <div id="tabOrders" class="hidden">
        <h3>Últimas Encomendas</h3>
        <p style="color: #4a5568; margin-bottom: 1rem;">O sistema de pagamento deve estar configurado na Base de Dados para aparecerem aqui.</p>
        <ul id="ordersList" style="list-style: none; padding: 0;">
          <!-- Fetch from JS -->
        </ul>
      </div>

    </div>
  </main>

  <script src="js/supabase.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
